<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
	<defs>
		<image id="img-light" width="96" height="96" href="data:image/png;base64,"/>
		<image id="img-dark" width="96" height="96" href="data:image/png;base64,"/>
	</defs>
	<style>
		#dark { display: none; }
		@media (prefers-color-scheme: dark) {
			#light { display: none; }
			#dark { display: inline; }
		}
	</style>
	<use id="light" href="#img-light"/>
	<use id="dark" href="#img-dark"/>
</svg>
